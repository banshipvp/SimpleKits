name: SimpleKits
version: '1.0'
api-version: '1.13'
main: local.simplekits.SimpleKitsPlugin
description: GKits, gkit gems, and mystery spawners
authors: [Dev]
softdepend: [FactionEnchants]

commands:
  gkits:
    description: Open gkits GUI
    aliases: [kitgui]
  kits:
    description: Open rank kits GUI
  gkit:
    description: Claim a specific gkit
    usage: /gkit <kitname>
  gkitgem:
    description: Give gkit gems
    usage: /gkitgem give <player> <kit|random> [amount]
  gkitlock:
    description: Lock gkits for players
    usage: /gkitlock <all|player <name>>
  mysterymobspawner:
    description: Get a mystery mob spawner
    usage: "/mysterymobspawner [open]"
    aliases: [mms]
  spawner:
    description: Give spawner to player
    usage: "/spawner give <player> <mob>"
  spawnerinfo:
    description: Get information about a stacked spawner
    usage: /spawnerinfo
  spawnerhelp:
    description: Show spawner stacking help
    usage: /spawnerhelp
